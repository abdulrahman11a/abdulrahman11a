name: 🏙️ Generate 3D Contribution Calendar

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: abdulrahman11a
          MAX_REPOS: 10
          SETTING_JSON: .github/3d-contrib-settings.json

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || git commit -m "🎨 Generate 3D Contribution Calendar"
          git push
