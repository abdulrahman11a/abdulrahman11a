name: 🎨 Generate Dynamic Header SVG

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Header SVG
        run: python3 dynamic-svg/generate_header.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dynamic-svg/header.svg
          git diff --staged --quiet || git commit -m "🎨 Update header SVG"
          git push
